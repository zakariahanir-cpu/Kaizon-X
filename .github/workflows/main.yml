name: Kaizon-X Hourly Run

on:
  schedule:
    - cron: '0 * * * *' # تشغيل كل ساعة
  workflow_dispatch: # تشغيل يدوي

jobs:
  run-kaizon-x:
    runs-on: ubuntu-latest
    permissions:
      contents: write # إذن الكتابة في المستودع ضروري لحفظ الذاكرة

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install python-dotenv

    - name: Run Kaizon-X engine
      run: python3 engine.py
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    - name: Commit and Push changes
      run: |
        git config --global user.name "Kaizon-X Bot"
        git config --global user.email "bot@kaizon-x.ai"
        git add kaizon_memory.json
        git add exec_evolution_*.py
        git add self_optimizer_v2.py
        git commit -m "Update memory and evolved code [skip ci]" || echo "No changes to commit"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
