name: Kaizon-X Hourly Run

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-kaizon-x:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install python-dotenv

    - name: Run Kaizon-X engine
      run: python3 engine.py
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    - name: Commit and Push changes
      run: |
        git config --global user.name "Kaizon-X Bot"
        git config --global user.email "bot@kaizon-x.ai"
        
        # إضافة ملف الذاكرة
        if [ -f kaizon_memory.json ]; then git add kaizon_memory.json; fi
        
        # إضافة جميع ملفات الإصدارات الجديدة kaizon_v*.py
        # نستخدم find لتجنب خطأ "did not match any files" إذا لم توجد ملفات جديدة
        find . -maxdepth 1 -name "kaizon_v*.py" -exec git add {} +
        
        # إضافة ملفات المحسن إذا وجدت
        if [ -f self_optimizer_v2.py ]; then git add self_optimizer_v2.py; f i
        
        git commit -m "Update memory and evolved versions [skip ci]" || echo "No changes to commit"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
